<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>בקשת רכש — Boardirector</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; padding: 22px; text-align: center; color: #222; }
    h2 { margin: 0 0 6px; }
    p { color: #555; margin: 0 0 16px; }
    button { font-size: 18px; padding: 14px 24px; background: #e04f2a; color: #fff;
             border: none; border-radius: 10px; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    .msg { margin-top: 16px; min-height: 22px; font-weight: 600; }
    .ok { color: #1a7f37; } .err { color: #c5421f; } .info { color: #555; }
  </style>
</head>
<body>
  <h2>בקשת רכש — Boardirector</h2>
  <p>שולח את החשבונית מהמייל הזה למילוי הטופס.</p>
  <button id="go">מלא בקשת רכש ⟶</button>
  <div class="msg info" id="msg"></div>
  <script>
    var HELPER = 'https://localhost:8765/fill';
    function setMsg(t, cls) { var m = document.getElementById('msg'); m.textContent = t; m.className = 'msg ' + (cls || 'info'); }

    function run() {
      var btn = document.getElementById('go'); btn.disabled = true;
      var item = Office.context.mailbox.item;
      var atts = (item.attachments || []).filter(function (a) {
        return a.attachmentType === 'file' && /\.pdf$/i.test(a.name);
      });
      if (!atts.length) { setMsg('לא נמצאה צרופת PDF במייל הזה', 'err'); btn.disabled = false; return; }
      var pdf = atts[0];
      setMsg('קורא את הצרופה…', 'info');

      item.body.getAsync('text', function (bodyRes) {
        var emailText = (bodyRes.status === 'succeeded') ? bodyRes.value : '';
        item.getAttachmentContentAsync(pdf.id, function (res) {
          if (res.status !== 'succeeded') { setMsg('שגיאה בקריאת הצרופה: ' + (res.error && res.error.message), 'err'); btn.disabled = false; return; }
          setMsg('שולח לעוזר וממלא את הטופס…', 'info');
          fetch(HELPER, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: pdf.name, contentBase64: res.value.content, emailText: emailText })
          }).then(function (r) { return r.json(); })
            .then(function (j) {
              if (j.ok) setMsg('✓ נשלח! הטופס מתמלא בדפדפן — בדוק ולחץ שלח.', 'ok');
              else setMsg('שגיאה: ' + j.error, 'err');
              btn.disabled = false;
            })
            .catch(function (e) {
              setMsg('לא הצלחתי להתחבר לעוזר המקומי. ודא שהוא רץ. (' + e.message + ')', 'err');
              btn.disabled = false;
            });
        });
      });
    }

    Office.onReady(function () {
      document.getElementById('go').addEventListener('click', run);
    });
  </script>
</body>
</html>
