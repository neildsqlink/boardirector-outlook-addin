<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>בקשת רכש — Boardirector</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; padding: 22px; text-align: center; color: #222; }
    h2 { margin: 0 0 6px; } p.sub { color: #555; margin: 0 0 16px; }
    button { font-size: 18px; padding: 14px 24px; background: #e04f2a; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }

    .steps { display: none; margin: 20px auto 0; width: max-content; text-align: right; }
    .step { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 15px; color: #b9b9b9; transition: color .2s; }
    .step .ind { width: 18px; height: 18px; flex: 0 0 18px; border-radius: 50%; background: #e3e3e3; position: relative; }
    /* active = spinning ring */
    .step.active { color: #e04f2a; font-weight: 700; }
    .step.active .ind { background: transparent; border: 3px solid #f3d8cf; border-top-color: #e04f2a; animation: spin .8s linear infinite; }
    /* done = green check */
    .step.done { color: #1a7f37; }
    .step.done .ind { background: #1a7f37; }
    .step.done .ind::after { content: "✓"; position: absolute; inset: 0; color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg { margin-top: 16px; min-height: 22px; font-weight: 600; }
    .ok { color: #1a7f37; } .err { color: #c5421f; }
  </style>
</head>
<body>
  <h2>בקשת רכש — Boardirector</h2>
  <p class="sub">ממלא את הטופס מהחשבונית שבמייל זה.</p>
  <button id="go">מלא בקשת רכש ⟶</button>

  <div class="steps" id="steps">
    <div class="step" id="s1"><span class="ind"></span><span>קורא את החשבונית</span></div>
    <div class="step" id="s2"><span class="ind"></span><span>ממלא את הטופס בדפדפן</span></div>
    <div class="step" id="s3"><span class="ind"></span><span>מוכן לבדיקה</span></div>
  </div>
  <div class="msg" id="msg"></div>

  <script>
    var HELPER = 'https://localhost:8765';
    function $(id){ return document.getElementById(id); }
    function setMsg(t, cls){ var m=$('msg'); m.textContent=t||''; m.className='msg '+(cls||''); }
    // active = which step (1..3) is spinning; steps before it are done
    function stage(active){
      [1,2,3].forEach(function(n){
        var el=$('s'+n);
        el.className = 'step' + (n<active ? ' done' : (n===active ? ' active' : ''));
      });
    }

    function poll(id, tries){
      tries = tries || 0;
      if (tries > 150) { setMsg('לוקח יותר מהרגיל — בדוק את הדפדפן.', 'err'); $('go').disabled=false; return; }
      fetch(HELPER + '/status?id=' + encodeURIComponent(id)).then(function(r){return r.json();}).then(function(j){
        if (j.status === 'reading') { stage(1); setTimeout(function(){poll(id,tries+1);}, 1500); }
        else if (j.status === 'filling') { stage(2); setTimeout(function(){poll(id,tries+1);}, 1500); }
        else if (j.status === 'done') { stage(4); setMsg('✓ הטופס מולא! עבור לדפדפן, בדוק ולחץ "שלח בקשה".', 'ok'); $('go').disabled=false; }
        else if (j.status === 'error') { setMsg('✗ משהו נכשל. נסה שוב, וודא ש-Chrome פתוח.', 'err'); $('go').disabled=false; }
        else { setTimeout(function(){poll(id,tries+1);}, 1500); }
      }).catch(function(){ setTimeout(function(){poll(id,tries+1);}, 2000); });
    }

    function run(){
      var btn=$('go'); btn.disabled=true;
      $('steps').style.display='inline-block'; stage(1); setMsg('');
      var item = Office.context.mailbox.item;
      var atts = (item.attachments||[]).filter(function(a){ return a.attachmentType==='file' && /\.pdf$/i.test(a.name); });
      if (!atts.length) { $('steps').style.display='none'; setMsg('לא נמצאה צרופת PDF במייל הזה', 'err'); btn.disabled=false; return; }
      var pdf = atts[0];
      item.body.getAsync('text', function(b){
        var emailText = (b.status==='succeeded') ? b.value : '';
        item.getAttachmentContentAsync(pdf.id, function(res){
          if (res.status!=='succeeded'){ setMsg('שגיאה בקריאת הצרופה', 'err'); btn.disabled=false; return; }
          fetch(HELPER + '/fill', { method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ filename: pdf.name, contentBase64: res.value.content, emailText: emailText }) })
            .then(function(r){return r.json();})
            .then(function(j){ if (j.ok && j.id) poll(j.id); else { setMsg('שגיאה: '+(j.error||'לא ידוע'),'err'); btn.disabled=false; } })
            .catch(function(e){ $('steps').style.display='none'; setMsg('אין חיבור לעוזר המקומי. ('+e.message+')','err'); btn.disabled=false; });
        });
      });
    }
    Office.onReady(function(){ $('go').addEventListener('click', run); });
  </script>
</body>
</html>
